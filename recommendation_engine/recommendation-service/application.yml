server:
  port: 8083

spring:
  application:
    name: recommendation-service
  datasource:
    url: jdbc:postgresql://localhost:5432/recengine
    username: recuser
    password: recpass
  jpa:
    hibernate:
      ddl-auto: validate
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis
    redis:
      time-to-live: 1800000   # 30 minutes in milliseconds

management:
  endpoints:
    web:
      exposure:
        include: health